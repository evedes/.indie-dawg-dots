# --- Prefix ---
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# --- General ---
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
set -g history-limit 100000
set -s escape-time 0
set -g mouse on

# --- Windows & Panes ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Easy splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Navigate windows (Alt-h/l still available as explicit window switching)
bind -n M-h previous-window
bind -n M-l next-window
# Reorder windows
bind -n M-i swap-window -t -1\; select-window -t -1
bind -n M-o swap-window -t +1\; select-window -t +1

# Kill pane: confirm, but Enter defaults to yes (quicker than typing y)
bind x confirm-before -y -p "kill-pane #P? (Y/n)" kill-pane

# Vim-style pane resizing
bind -r h resize-pane -L 1
bind -r j resize-pane -D 1
bind -r k resize-pane -U 1
bind -r l resize-pane -R 1

# --- Status Bar ---
set -g mode-style "fg=#272727,bg=#faf4c6"
set -g message-style "fg=#272727,bg=#faf4c6"
set -g status-position top
set -g status-style "bg=#272727"
set -g window-status-separator ""
set -g status-left-length 60
set -g status-left "#[bg=#87afd7,fg=#272727,bold] #(hostname | sed 's/\\.local//' | tr '[:lower:]' '[:upper:]') #[fg=#87afd7,bg=#faf4c6]#[bg=#faf4c6,fg=#272727,bold] #S #[fg=#faf4c6,bg=#272727,nobold]"
set -g status-right ""
set -g window-status-current-format "#[fg=#272727,bg=#87afd7]#[fg=#272727,bg=#87afd7,bold,underscore] #I:#W #[fg=#87afd7,bg=#272727]"
set -g window-status-format "#[fg=#272727,bg=#8787af]#[fg=#272727,bg=#8787af] #I:#W #[fg=#8787af,bg=#272727]"

# --- Copy Mode (Vi) ---
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# --- Reload Config ---
bind r source-file ~/.tmux.conf \; display "#[bg=#faf4c6,fg=#272727,bold] RELOADED 🚀 "

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'alexwforsythe/tmux-which-key'

# Plugin Settings
set -g @continuum-restore 'on'               # Auto-restore sessions
set -g @resurrect-strategy-nvim 'session'    # Restore Neovim sessions

# Initialize TMUX plugin manager (keep this line at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
